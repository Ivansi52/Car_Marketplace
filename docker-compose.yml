version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: car_marketplace_db
    environment:
      POSTGRES_DB: car_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - car_marketplace_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: car_marketplace_backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: car_marketplace
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - car_marketplace_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: car_marketplace_frontend
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_GRAPHQL_URL: http://localhost:5000/graphql
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - car_marketplace_network
    command: npm run dev

volumes:
  postgres_data:

networks:
  car_marketplace_network:
    driver: bridge